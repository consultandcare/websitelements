<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Footer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #161616;
            --text-color: #ffffff;
            --accent-color: #d4af37; /* Gold color for headings/logo */
            --icon-color: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
        }

        /* Footer Container */
        .custom-footer {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 50px 20px 20px 20px;
            font-size: 14px;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        /* Column Styling */
        .footer-col h3 {
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 25px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-col h3 img {
            width: 20px;
            height: auto;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-col ul li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1.4;
        }

        .footer-col ul li a {
            color: var(--text-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-col ul li a:hover {
            color: var(--accent-color);
        }

        /* Target unique dot icons for quick links */
        .quick-links i {
            font-size: 12px;
        }

        /* Bottom Row Styling */
        .footer-bottom {
            max-width: 1200px;
            margin: 40px auto 0 auto;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Logo Branding */
        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 20px;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 10px;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .social-icons a:hover {
            transform: scale(1.1);
        }

        /* Social Brands Colors */
        .social-icons .facebook { background-color: #3b5998; }
        .social-icons .tiktok { background-color: #000000; border: 1px solid #333; }
        .social-icons .instagram { background-color: #e1306c; }
        .social-icons .youtube { background-color: #ff0000; }
        .social-icons .linkedin { background-color: #0077b5; }

        /* Copyright Text */
        .copyright {
            color: #888888;
            font-size: 13px;
        }

        /* Responsive Layout for Tablets and Mobile */
        @media (max-width: 992px) {
            .footer-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .footer-container {
                grid-template-columns: 1fr;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
